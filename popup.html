<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日含金量</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <span class="logo">Au</span>
        <div>
          <h1>今日含金量</h1>
          <p class="subtitle" id="updated-time">加载中...</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="calc-btn" id="calc-btn" title="金价换算器">🧮</button>
        <button class="theme-btn" id="theme-btn" title="切换主题">🌙</button>
        <button class="refresh-btn" id="refresh-btn" title="刷新">
          <svg id="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 实时大盘金价 -->
    <section class="section" id="spot-section">
      <div class="section-title">实时大盘金价 · 基础对标</div>
      <div class="spot-card" id="spot-card">
        <div class="spot-row">
          <span class="spot-label">AU9999 上海黄金交易所</span>
        </div>
        <div class="spot-row">
          <span class="spot-price" id="spot-price">—</span>
          <span class="metal-change flat" id="spot-change">—</span>
        </div>
        <hr class="spot-divider">
        <div class="spot-row">
          <span class="spot-recovery-label">大盘回收基准价</span>
          <span class="spot-recovery-price" id="spot-recovery">—</span>
        </div>
        <span class="spot-recovery-note">门店实际回收价 = 大盘价 − 10~30 元/克（以门店当日为准）</span>
      </div>
    </section>

    <!-- 各大金店 -->
    <section class="section" id="brands-section">
      <div class="section-title">各大金店 · 足金零售</div>
      <div class="brands-grid" id="brand-prices">
        <div class="brand-header">
          <span class="bh-col">品牌</span>
          <span class="bh-col">价格</span>
          <span class="bh-col">涨跌率</span>
        </div>
        <div class="brand-row skeleton">
          <span class="brand-name">加载中</span>
          <span class="brand-price">—</span>
          <span class="metal-change">—</span>
        </div>
        <div class="brand-row skeleton">
          <span class="brand-name">加载中</span>
          <span class="brand-price">—</span>
          <span class="metal-change">—</span>
        </div>
        <div class="brand-row skeleton">
          <span class="brand-name">加载中</span>
          <span class="brand-price">—</span>
          <span class="metal-change">—</span>
        </div>
        <div class="brand-row skeleton">
          <span class="brand-name">加载中</span>
          <span class="brand-price">—</span>
          <span class="metal-change">—</span>
        </div>
        <div class="brand-row skeleton">
          <span class="brand-name">加载中</span>
          <span class="brand-price">—</span>
          <span class="metal-change">—</span>
        </div>
      </div>
    </section>

    <!-- 金价换算器 -->
    <section class="section calc-section" id="calc-section" style="display:none">
      <div class="section-title">金价换算器</div>
      <div class="calc-panel">
        <div class="calc-row">
          <input type="number" id="calc-input" class="calc-input" placeholder="输入克数" min="0" step="0.1" value="10">
          <select id="calc-unit" class="calc-unit">
            <option value="g">克</option>
            <option value="qian">钱 (5克)</option>
            <option value="liang">两 (50克)</option>
          </select>
        </div>
        <div class="calc-brand-select" id="calc-brand-select">
          <!-- brand buttons rendered by JS -->
        </div>
        <div class="calc-result" id="calc-result">
          <!-- result rendered by JS -->
        </div>
      </div>
    </section>

    <footer>
      <span>价格仅供参考，不作交易依据</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
